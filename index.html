<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumeet Elko | Waste Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1b5e20; --dark: #0a3d0d; --blue: #0d47a1; --bg: #f0f2f5; --white: #ffffff; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg); margin: 0; padding: 15px; color: #333; }
        .container { max-width: 1400px; margin: auto; }

        .main-header { 
            background: linear-gradient(135deg, var(--primary), var(--dark)); 
            color: white; padding: 20px; border-radius: 15px; 
            display: flex; align-items: center; justify-content: center; gap: 20px;
            margin-bottom: 25px; box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }
        .logo { height: 60px; background: white; padding: 5px; border-radius: 8px; }
        .header-text h1 { margin: 0; font-size: 1.8rem; letter-spacing: 1px; }

        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 25px; }
        .stat-card { background: var(--white); padding: 20px; border-radius: 12px; text-align: center; border-bottom: 5px solid var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .stat-card h3 { margin: 0; font-size: 0.75rem; color: #777; text-transform: uppercase; }
        .value { font-size: 1.6rem; font-weight: 700; margin-top: 5px; color: var(--dark); }

        .content-grid { display: grid; grid-template-columns: 380px 1fr; gap: 20px; }
        .panel { background: var(--white); padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); height: fit-content; }
        h2 { font-size: 1.1rem; margin-top: 0; color: var(--primary); border-bottom: 2px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }

        input, select { font-family: 'Poppins'; width: 100%; padding: 10px; margin: 8px 0; border: 1.5px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .trip-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: #f9f9f9; padding: 10px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--primary); }
        .btn-save { background: var(--primary); color: white; border: none; padding: 15px; border-radius: 10px; font-weight: 600; width: 100%; cursor: pointer; font-size: 1rem; }

        /* Scrollable Feed - Fixed Data Visibility */
        .scroll-container { max-height: 600px; overflow-y: auto; padding-right: 5px; }
        .entry-card { 
            background: #fff; border: 1px solid #eee; border-radius: 10px; 
            padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
        .info b { font-size: 1rem; color: var(--dark); }
        .info p { margin: 2px 0; font-size: 0.75rem; color: #666; }
        .total-wt { font-size: 1.1rem; font-weight: 700; color: var(--primary); margin-left: 10px; }
        .btn-wa { background: #25D366; color: white; border: none; padding: 6px 10px; border-radius: 5px; cursor: pointer; margin-left: 10px; font-size: 0.7rem; }

        @media (max-width: 1000px) { .content-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="main-header">
        <img src="logo.png" alt="Logo" class="logo" onerror="this.style.display='none'">
        <div class="header-text">
            <h1>SUMEET ELKO</h1>
            <p>Motha Gaon Wet Waste Management</p>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="stat-card"><h3>Total Entries</h3><div id="all-v" class="value">0</div></div>
        <div class="stat-card"><h3>Today's Entries</h3><div id="today-v" class="value">0</div></div>
        <div class="stat-card" style="border-color: var(--blue);"><h3>Total Weight</h3><div id="all-w" class="value" style="color: var(--blue);">0 kg</div></div>
        <div class="stat-card" style="border-color: var(--blue);"><h3>Today's Weight</h3><div id="today-w" class="value" style="color: var(--blue);">0 kg</div></div>
    </div>

    <div class="content-grid">
        <div class="panel">
            <h2>New Entry</h2>
            <form id="entryForm">
                <input type="date" id="date" required>
                <input type="text" id="sName" placeholder="Supervisor Name" required>
                <input type="text" id="vehicle" placeholder="Vehicle No" required>
                <div class="trip-row"><input type="number" id="t1" value="0"><select id="ty1"><option value="Wet">Wet</option><option value="Mix">Mix</option></select></div>
                <div class="trip-row"><input type="number" id="t2" value="0"><select id="ty2"><option value="Wet">Wet</option><option value="Mix">Mix</option></select></div>
                <div class="trip-row"><input type="number" id="t3" value="0"><select id="ty3"><option value="Wet">Wet</option><option value="Mix">Mix</option></select></div>
                <input type="text" id="remark" placeholder="Remark / Ward">
                <button type="submit" id="saveBtn" class="btn-save">Save Entry</button>
            </form>
        </div>

        <div class="panel">
            <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom: 15px;">
                <h2 style="margin:0; border:0;">Daily Report Feed</h2>
                <input type="date" id="filterDate" style="width: 150px; margin:0;" onchange="renderDisplay()">
            </div>
            <div id="status" style="font-size: 0.7rem; color: var(--blue); margin-bottom: 10px;">Loading data from Google Sheets...</div>
            <div class="scroll-container" id="feedList"></div>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzU9rn2QhjFTHNCGuY3Qc7RMaPs3Izv5SE0EUBb_FmrJCDk3TQV9RlOHcZYSzv5NMLHOg/exec"; // PASTE URL HERE
    let masterData = [];

    document.getElementById('date').value = new Date().toISOString().split('T')[0];
    document.getElementById('filterDate').value = new Date().toISOString().split('T')[0];

    async function loadData() {
        try {
            const response = await fetch(SCRIPT_URL);
            masterData = await response.json();
            renderDisplay();
            document.getElementById('status').innerText = "Last Sync: " + new Date().toLocaleTimeString();
        } catch (e) {
            document.getElementById('status').innerText = "Sync Error. Please check Script URL.";
        }
    }

    document.getElementById('entryForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('saveBtn');
        btn.innerText = "Saving..."; btn.disabled = true;

        const payload = {
            date: document.getElementById('date').value,
            sName: document.getElementById('sName').value,
            vehicle: document.getElementById('vehicle').value.toUpperCase(),
            t1: parseFloat(document.getElementById('t1').value) || 0,
            t2: parseFloat(document.getElementById('t2').value) || 0,
            t3: parseFloat(document.getElementById('t3').value) || 0,
            ty1: document.getElementById('ty1').value, ty2: document.getElementById('ty2').value, ty3: document.getElementById('ty3').value,
            remark: document.getElementById('remark').value || "-"
        };

        try {
            await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
            alert("Entry Saved!");
            e.target.reset();
            document.getElementById('date').value = new Date().toISOString().split('T')[0];
            setTimeout(loadData, 2000);
        } catch (err) { alert("Error!"); }
        btn.innerText = "Save Entry"; btn.disabled = false;
    });

    function renderDisplay() {
        const feed = document.getElementById('feedList');
        const filterDate = document.getElementById('filterDate').value;
        feed.innerHTML = '';
        
        let tV = 0, tW = 0, aV = 0, aW = 0;

        // Sorting: Latest entries on top
        const displayData = [...masterData].reverse();

        displayData.forEach((item) => {
            // Support both Capital/Small keys from Script
            const v1 = parseFloat(item.t1 || item.T1 || 0);
            const v2 = parseFloat(item.t2 || item.T2 || 0);
            const v3 = parseFloat(item.t3 || item.T3 || 0);
            const rowSum = v1 + v2 + v3;
            
            aV++; aW += rowSum;

            // Date Check
            let itemDate = "";
            try {
                itemDate = new Date(item.date || item.Date).toISOString().split('T')[0];
            } catch(e) { itemDate = ""; }

            // If date matches OR if you want to see all entries, they will be rendered here
            if(itemDate === filterDate) {
                tV++; tW += rowSum;
            }

            // RENDERING ALL ENTRIES (So nothing is hidden)
            feed.innerHTML += `
                <div class="entry-card" style="${itemDate === filterDate ? 'border-left: 5px solid var(--primary); background: #f1f8e9;' : ''}">
                    <div class="info">
                        <b>${item.vehicle || item.Vehicle || 'N/A'}</b>
                        <p>${itemDate} | ${item.sname || item.sName || item.Supervisor || '-'}</p>
                        <small>${v1}kg(${item.ty1||'Wet'}), ${v2}kg(${item.ty2||'Mix'}), ${v3}kg(${item.ty3||'Wet'})</small>
                    </div>
                    <div style="display:flex; align-items:center;">
                        <div class="total-wt">${rowSum} kg</div>
                        <button class="btn-wa" onclick="sendWA('${item.vehicle}', ${rowSum})">WA</button>
                    </div>
                </div>`;
        });

        document.getElementById('all-v').innerText = aV;
        document.getElementById('all-w').innerText = aW + " kg";
        document.getElementById('today-v').innerText = tV;
        document.getElementById('today-w').innerText = tW + " kg";
    }

    function sendWA(vNo, total) {
        const msg = `*SUMEET ELKO*%0AVehicle: ${vNo}%0ATotal Weight: ${total}kg`;
        window.open(`https://wa.me/?text=${msg}`, '_blank');
    }

    loadData();
    setInterval(loadData, 30000);
</script>
</body>
</html>
