<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sumeet Elko - Live Dashboard</title>
    <style>
        :root { --primary: #1b5e20; --dark: #0a3d0d; --blue: #0d47a1; --bg: #f4f7f6; --white: #ffffff; --wa: #25D366; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: auto; }
        
        /* Logo on Green Header */
        .main-header { 
            background: linear-gradient(135deg, var(--primary), var(--dark)); 
            color: white; padding: 20px; border-radius: 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            display: flex; align-items: center; justify-content: center; gap: 20px;
            margin-bottom: 25px;
        }
        .company-logo { height: 60px; width: auto; border-radius: 5px; background: white; padding: 5px; }
        .header-text h1 { margin: 0; font-size: 2.2rem; letter-spacing: 1px; }
        .header-text p { margin: 0; opacity: 0.9; font-size: 0.9rem; }

        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: var(--white); padding: 20px; border-radius: 15px; text-align: center; border-top: 5px solid var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .value { font-size: 1.8rem; font-weight: bold; margin-top: 10px; color: var(--dark); }
        
        .content-grid { display: grid; grid-template-columns: 400px 1fr; gap: 20px; }
        .panel { background: var(--white); padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        
        input, select { width: 100%; padding: 10px; margin: 8px 0; border: 1.5px solid #eee; border-radius: 8px; box-sizing: border-box; }
        .trip-box { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; background: #f9f9f9; padding: 10px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid var(--primary); }
        
        .btn-save { background: var(--primary); color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1.1rem; }
        .btn-save:disabled { background: #666; cursor: not-allowed; }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.85rem; }
        th { background: #f1f8e9; padding: 12px; border-bottom: 2px solid #ddd; }
        td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; }
        
        .badge { padding: 3px 7px; border-radius: 4px; color: white; font-size: 0.7rem; }
        .btn-action { border: none; padding: 6px 10px; border-radius: 5px; cursor: pointer; color: white; margin: 2px; }

        @media (max-width: 1000px) { 
            .content-grid { grid-template-columns: 1fr; }
            .main-header { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="main-header">
        <img src="logo.png" alt="Logo" class="company-logo" onerror="this.style.display='none'">
        <div class="header-text">
            <h1>SUMEET ELKO</h1>
            <p>Mothe Gaon Waste Tracking Dashboard</p>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="stat-card"><h3>आजच्या गाड्या</h3><div id="today-v" class="value">0</div></div>
        <div class="stat-card"><h3>आजचे वजन</h3><div id="today-w" class="value">0 kg</div></div>
        <div class="stat-card" style="border-top-color: var(--blue);"><h3>एकूण गाड्या</h3><div id="all-v" class="value" style="color:var(--blue)">0</div></div>
        <div class="stat-card" style="border-top-color: var(--blue);"><h3>एकूण वजन</h3><div id="all-w" class="value" style="color:var(--blue)">0 kg</div></div>
    </div>

    <div class="content-grid">
        <div class="panel">
            <h2>नवीन एन्ट्री</h2>
            <form id="wasteForm">
                <input type="date" id="date" required>
                <input type="text" id="sName" placeholder="सुपरवायझरचे नाव" required>
                <input type="text" id="vehicle" placeholder="गाडी क्रमांक" required>
                
                <div class="trip-box">
                    <input type="number" id="t1" placeholder="T1 (kg)" value="0">
                    <select id="ty1"><option value="Wet">Wet</option><option value="Mix">Mix</option></select>
                </div>
                <div class="trip-box">
                    <input type="number" id="t2" placeholder="T2 (kg)" value="0">
                    <select id="ty2"><option value="Wet">Wet</option><option value="Mix">Mix</option></select>
                </div>
                <div class="trip-box">
                    <input type="number" id="t3" placeholder="T3 (kg)" value="0">
                    <select id="ty3"><option value="Wet">Wet</option><option value="Mix">Mix</option></select>
                </div>

                <input type="text" id="remark" placeholder="रिमार्क / वॉर्ड">
                <button type="submit" id="submitBtn" class="btn-save">डेटा सेव्ह करा</button>
            </form>
        </div>

        <div class="panel">
            <div style="display:flex; justify-content: space-between; align-items:center;">
                <h2>लाईव्ह अहवाल</h2>
                <input type="date" id="filterDate" onchange="updateDisplay()">
            </div>
            <div id="status" style="font-size: 0.8rem; color: var(--blue); margin-top: 5px;"></div>
            <table>
                <thead>
                    <tr><th>गाडी</th><th>Trip 1</th><th>Trip 2</th><th>Trip 3</th><th>एकूण</th><th>कृती</th></tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxq1tG6EHLNqeeBr0UMGEwpmUYo_07AfSUYzTvrSBUn1mF-FYb4-pINmDUoDnuKNV-WoQ/exec"; 
    let cloudData = [];

    document.getElementById('date').value = new Date().toISOString().split('T')[0];
    document.getElementById('filterDate').value = new Date().toISOString().split('T')[0];

    // डॅशबोर्ड अपडेट करण्यासाठी डेटा ओढणे
    async function refreshData() {
        document.getElementById('status').innerText = "Syncing with cloud...";
        try {
            const res = await fetch(SCRIPT_URL);
            const rawData = await res.json();
            // डेटा आला की नाही हे चेक करा
            if (rawData && rawData.length >= 0) {
                cloudData = rawData;
                localStorage.setItem('sumeet_cache', JSON.stringify(cloudData));
                updateDisplay();
                document.getElementById('status').innerText = "Cloud Synced ✅";
            }
        } catch (e) {
            console.log("Offline mode");
            cloudData = JSON.parse(localStorage.getItem('sumeet_cache')) || [];
            updateDisplay();
            document.getElementById('status').innerText = "Offline Mode (Using Cache)";
        }
    }

    document.getElementById('wasteForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.innerText = "Saving..."; btn.disabled = true;

        const entry = {
            date: document.getElementById('date').value,
            sName: document.getElementById('sName').value,
            vehicle: document.getElementById('vehicle').value.toUpperCase(),
            t1: parseFloat(document.getElementById('t1').value) || 0, ty1: document.getElementById('ty1').value,
            t2: parseFloat(document.getElementById('t2').value) || 0, ty2: document.getElementById('ty2').value,
            t3: parseFloat(document.getElementById('t3').value) || 0, ty3: document.getElementById('ty3').value,
            remark: document.getElementById('remark').value || "-"
        };

        try {
            await fetch(SCRIPT_URL, { 
                method: 'POST', 
                mode: 'no-cors', 
                body: JSON.stringify(entry) 
            });
            alert("Entry Saved!");
            e.target.reset();
            document.getElementById('date').value = new Date().toISOString().split('T')[0];
            // सेव्ह केल्यावर ३ सेकंदानंतर रिफ्रेश करा
            setTimeout(refreshData, 3000);
        } catch (err) { alert("Save Failed!"); }
        
        btn.innerText = "डेटा सेव्ह करा"; btn.disabled = false;
    });

    function updateDisplay() {
        const tbody = document.getElementById('tableBody');
        const fDate = document.getElementById('filterDate').value;
        tbody.innerHTML = '';
        let tV = 0, tW = 0, aW = 0;

        cloudData.forEach((item, index) => {
            const sum = (item.t1 || 0) + (item.t2 || 0) + (item.t3 || 0);
            aW += sum;
            
            // तारीख मॅचिंग सुधारणा
            let itemDateStr = "";
            try { itemDateStr = new Date(item.date).toISOString().split('T')[0]; } catch(e) { itemDateStr = item.date; }

            if(itemDateStr === fDate) {
                tV++; tW += sum;
                tbody.innerHTML += `<tr>
                    <td><b>${item.vehicle}</b><br><small>${item.sName}</small></td>
                    <td>${item.t1} <span class="badge" style="background:${item.ty1=='Wet'?'#2e7d32':'#d32f2f'}">${item.ty1}</span></td>
                    <td>${item.t2} <span class="badge" style="background:${item.ty2=='Wet'?'#2e7d32':'#d32f2f'}">${item.ty2}</span></td>
                    <td>${item.t3} <span class="badge" style="background:${item.ty3=='Wet'?'#2e7d32':'#d32f2f'}">${item.ty3}</span></td>
                    <td style="font-weight:bold; color:var(--primary)">${sum} kg</td>
                    <td>
                        <button class="btn-action" style="background:var(--wa)" onclick="sendWA(${index})">WA</button>
                    </td>
                </tr>`;
            }
        });

        document.getElementById('today-v').innerText = tV;
        document.getElementById('today-w').innerText = tW + " kg";
        document.getElementById('all-v').innerText = cloudData.length;
        document.getElementById('all-w').innerText = aW + " kg";
    }

    function sendWA(idx) {
        const i = cloudData[idx];
        const msg = `*SUMEET ELKO*%0AVehicle: ${i.vehicle}%0ATotal: ${i.t1+i.t2+i.t3} kg`;
        window.open(`https://wa.me/?text=${msg}`, '_blank');
    }

    // ऑटोमॅटिक सुरू करा
    refreshData();
    // दर ३० सेकंदाला अपडेट करा
    setInterval(refreshData, 30000);
</script>
</body>
</html>
